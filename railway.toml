[build]
builder = "nixpacks"

[deploy]
startCommand = "npm run check:env && npm run test:app && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.variables]
NODE_NO_WARNINGS = "1"
NODE_OPTIONS = "--no-deprecation --no-warnings" 
